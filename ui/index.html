<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Scale Your LLM — Chat</title>
<style>
  :root {
    --bg: #1f1f1f;
    --panel: #2a2a2a;
    --user-bubble: #2f6fed;
    --assistant-bg: transparent;
    --text: #ececec;
    --muted: #9a9a9a;
    --border: #3a3a3a;
    --accent: #d97757;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  #app { display: flex; flex-direction: column; height: 100vh; }
  header {
    padding: 12px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px; flex-shrink: 0;
  }
  header .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); }
  header h1 { font-size: 15px; font-weight: 600; margin: 0; }
  header .model { font-size: 12px; color: var(--muted); margin-left: auto; }
  #messages { flex: 1; overflow-y: auto; padding: 24px 0; }
  .row { max-width: 780px; margin: 0 auto; padding: 4px 20px; }
  .msg { display: flex; gap: 14px; padding: 14px 0; }
  .avatar {
    width: 30px; height: 30px; border-radius: 6px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: #fff;
  }
  .msg.user .avatar { background: var(--user-bubble); }
  .msg.assistant .avatar { background: var(--accent); }
  .bubble { padding-top: 4px; line-height: 1.6; white-space: pre-wrap; word-wrap: break-word; flex: 1; }
  .bubble p { margin: 0 0 10px; }
  .bubble pre {
    background: #141414; border: 1px solid var(--border); border-radius: 8px;
    padding: 12px; overflow-x: auto; font-size: 13px;
  }
  .bubble code { font-family: "SFMono-Regular", Consolas, monospace; }
  .bubble :not(pre) > code { background: #141414; padding: 2px 5px; border-radius: 4px; font-size: 13px; }
  .empty { text-align: center; color: var(--muted); margin-top: 18vh; }
  .empty h2 { color: var(--text); font-weight: 600; }
  .cursor::after { content: "▋"; color: var(--accent); animation: blink 1s steps(2) infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  footer { flex-shrink: 0; padding: 12px 20px 20px; }
  .composer {
    max-width: 780px; margin: 0 auto; background: var(--panel);
    border: 1px solid var(--border); border-radius: 14px;
    display: flex; align-items: flex-end; padding: 8px 8px 8px 16px;
  }
  textarea {
    flex: 1; background: transparent; border: none; color: var(--text);
    resize: none; outline: none; font-size: 15px; line-height: 1.5;
    max-height: 200px; padding: 8px 0; font-family: inherit;
  }
  button#send {
    background: var(--accent); border: none; color: #fff; cursor: pointer;
    width: 36px; height: 36px; border-radius: 9px; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
  }
  button#send:disabled { opacity: 0.4; cursor: default; }
  .hint { max-width: 780px; margin: 8px auto 0; text-align: center; color: var(--muted); font-size: 11px; }
</style>
</head>
<body>
<div id="app">
  <header>
    <span class="dot"></span>
    <h1>Scale Your LLM</h1>
    <span class="model" id="model-name">connecting…</span>
  </header>
  <div id="messages">
    <div class="empty" id="empty">
      <h2>How can I help you today?</h2>
      <p>Chat with your local llama.cpp model.</p>
    </div>
  </div>
  <footer>
    <div class="composer">
      <textarea id="input" rows="1" placeholder="Message the model…" autofocus></textarea>
      <button id="send" title="Send">↑</button>
    </div>
    <div class="hint">Conversation is not saved. Press Enter to send, Shift+Enter for newline.</div>
  </footer>
</div>

<script>
const messagesEl = document.getElementById("messages");
const emptyEl = document.getElementById("empty");
const inputEl = document.getElementById("input");
const sendBtn = document.getElementById("send");
const modelNameEl = document.getElementById("model-name");

let history = [];   // {role, content} — kept in memory only
let streaming = false;

// fetch model name
fetch("/api/model").then(r => r.json()).then(d => {
  modelNameEl.textContent = d.model || "model";
}).catch(() => { modelNameEl.textContent = "offline"; });

function autosize() {
  inputEl.style.height = "auto";
  inputEl.style.height = Math.min(inputEl.scrollHeight, 200) + "px";
}
inputEl.addEventListener("input", autosize);

inputEl.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});
sendBtn.addEventListener("click", send);

function escapeHtml(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

// minimal markdown: code fences + inline code
function render(text) {
  let html = escapeHtml(text);
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => `<pre><code>${code}</code></pre>`);
  html = html.replace(/`([^`\n]+)`/g, "<code>$1</code>");
  return html;
}

function addMessage(role, content) {
  emptyEl.style.display = "none";
  const row = document.createElement("div");
  row.className = "row";
  const msg = document.createElement("div");
  msg.className = "msg " + role;
  const avatar = document.createElement("div");
  avatar.className = "avatar";
  avatar.textContent = role === "user" ? "U" : "AI";
  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.innerHTML = render(content);
  msg.appendChild(avatar);
  msg.appendChild(bubble);
  row.appendChild(msg);
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return bubble;
}

async function send() {
  const text = inputEl.value.trim();
  if (!text || streaming) return;
  streaming = true;
  sendBtn.disabled = true;

  addMessage("user", text);
  history.push({ role: "user", content: text });
  inputEl.value = "";
  autosize();

  const bubble = addMessage("assistant", "");
  bubble.classList.add("cursor");
  let acc = "";

  try {
    const resp = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages: history }),
    });
    if (!resp.ok || !resp.body) throw new Error("HTTP " + resp.status);

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split("\n");
      buf = lines.pop();
      for (const line of lines) {
        const t = line.trim();
        if (!t.startsWith("data:")) continue;
        const data = t.slice(5).trim();
        if (data === "[DONE]") continue;
        try {
          const json = JSON.parse(data);
          const delta = json.choices?.[0]?.delta?.content || "";
          if (delta) {
            acc += delta;
            bubble.innerHTML = render(acc);
            messagesEl.scrollTop = messagesEl.scrollHeight;
          }
        } catch (_) {}
      }
    }
  } catch (err) {
    acc += "\n\n[error: " + err.message + "]";
    bubble.innerHTML = render(acc);
  } finally {
    bubble.classList.remove("cursor");
    history.push({ role: "assistant", content: acc });
    streaming = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }
}
</script>
</body>
</html>
