<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Scale Your LLM — Chat</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<style>
  :root {
    --bg: #1f1f1f;
    --panel: #2a2a2a;
    --user-bubble: #2f6fed;
    --assistant-bg: transparent;
    --text: #ececec;
    --muted: #9a9a9a;
    --border: #3a3a3a;
    --accent: #d97757;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  #app { display: flex; flex-direction: column; height: 100vh; }
  header {
    padding: 12px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px; flex-shrink: 0;
  }
  header .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); }
  header h1 { font-size: 15px; font-weight: 600; margin: 0; }
  header .model { font-size: 12px; color: var(--muted); margin-left: auto; }
  #messages { flex: 1; overflow-y: auto; padding: 24px 0; }
  .row { max-width: 780px; margin: 0 auto; padding: 4px 20px; }
  .msg { display: flex; gap: 14px; padding: 14px 0; }
  .avatar {
    width: 30px; height: 30px; border-radius: 6px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: #fff;
  }
  .msg.user .avatar { background: var(--user-bubble); }
  .msg.assistant .avatar { background: var(--accent); }
  .bubble { padding-top: 4px; line-height: 1.6; word-wrap: break-word; flex: 1; }
  .bubble p { margin: 0 0 10px; }
  .bubble h1, .bubble h2, .bubble h3, .bubble h4, .bubble h5, .bubble h6 { margin: 14px 0 6px; line-height: 1.3; }
  .bubble h1 { font-size: 1.4em; } .bubble h2 { font-size: 1.25em; } .bubble h3 { font-size: 1.1em; }
  .bubble ul, .bubble ol { margin: 0 0 10px; padding-left: 1.6em; }
  .bubble li { margin: 3px 0; }
  .bubble blockquote { border-left: 3px solid var(--accent); margin: 8px 0; padding: 4px 12px; color: var(--muted); }
  .bubble hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
  .bubble strong { font-weight: 700; }
  .bubble em { font-style: italic; }
  .bubble del { text-decoration: line-through; }
  .bubble pre {
    background: #141414; border: 1px solid var(--border); border-radius: 8px;
    padding: 12px; overflow-x: auto; font-size: 13px;
  }
  .bubble code { font-family: "SFMono-Regular", Consolas, monospace; }
  .bubble :not(pre) > code { background: #141414; padding: 2px 5px; border-radius: 4px; font-size: 13px; }
  .empty { text-align: center; color: var(--muted); margin-top: 18vh; }
  .empty h2 { color: var(--text); font-weight: 600; }
  .cursor::after { content: "▋"; color: var(--accent); animation: blink 1s steps(2) infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  footer { flex-shrink: 0; padding: 12px 20px 20px; }
  .composer {
    max-width: 780px; margin: 0 auto; background: var(--panel);
    border: 1px solid var(--border); border-radius: 14px;
    display: flex; align-items: flex-end; padding: 8px 8px 8px 16px;
  }
  textarea {
    flex: 1; background: transparent; border: none; color: var(--text);
    resize: none; outline: none; font-size: 15px; line-height: 1.5;
    max-height: 200px; padding: 8px 0; font-family: inherit;
  }
  button#send {
    background: var(--accent); border: none; color: #fff; cursor: pointer;
    width: 36px; height: 36px; border-radius: 9px; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
  }
  button#send:disabled { opacity: 0.4; cursor: default; }
  .hint { max-width: 780px; margin: 8px auto 0; text-align: center; color: var(--muted); font-size: 11px; }
  .bubble .katex-display { margin: 10px 0; overflow-x: auto; }
  .bubble .katex { font-size: 1.05em; }
</style>
</head>
<body>
<div id="app">
  <header>
    <span class="dot"></span>
    <h1>Scale Your LLM</h1>
    <span class="model" id="model-name">connecting…</span>
  </header>
  <div id="messages">
    <div class="empty" id="empty">
      <h2>How can I help you today?</h2>
      <p>Chat with your local llama.cpp model.</p>
    </div>
  </div>
  <footer>
    <div class="composer">
      <textarea id="input" rows="1" placeholder="Message the model…" autofocus></textarea>
      <button id="send" title="Send">↑</button>
    </div>
    <div class="hint">Conversation is not saved. Press Enter to send, Shift+Enter for newline.</div>
  </footer>
</div>

<script>
const messagesEl = document.getElementById("messages");
const emptyEl = document.getElementById("empty");
const inputEl = document.getElementById("input");
const sendBtn = document.getElementById("send");
const modelNameEl = document.getElementById("model-name");

let history = [];
let streaming = false;

function autosize() {
  inputEl.style.height = "auto";
  inputEl.style.height = Math.min(inputEl.scrollHeight, 200) + "px";
}
inputEl.addEventListener("input", autosize);

inputEl.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});
sendBtn.addEventListener("click", send);

function escapeHtml(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function katexRender(src, displayMode) {
  try {
    return katex.renderToString(src, { displayMode, throwOnError: false, output: "html" });
  } catch(e) {
    return escapeHtml(src);
  }
}

function render(text) {
  // Step 0: Extract math blocks FIRST (before any escaping) to protect them
  const mathBlocks = [];
  function saveMath(src, displayMode) {
    const idx = mathBlocks.length;
    mathBlocks.push(katexRender(src, displayMode));
    return `\x00MATH${idx}\x00`;
  }

  // Display math: $$...$$ and \[...\]
  text = text.replace(/\$\$([\s\S]+?)\$\$/g, (_, m) => saveMath(m, true));
  text = text.replace(/\\\[([\s\S]+?)\\\]/g, (_, m) => saveMath(m, true));
  // Inline math: \(...\) and $...$ (single dollar, not preceded/followed by another $)
  text = text.replace(/\\\(([\s\S]+?)\\\)/g, (_, m) => saveMath(m, false));
  text = text.replace(/(?<!\$)\$(?!\$)([^$\n]+?)\$(?!\$)/g, (_, m) => saveMath(m, false));

  // Step 1: Extract fenced code blocks to protect them from further processing
  const codeBlocks = [];
  let html = text.replace(/```([\w]*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    const escaped = escapeHtml(code.replace(/\n$/, ""));
    const idx = codeBlocks.length;
    codeBlocks.push(`<pre><code>${escaped}</code></pre>`);
    return `\x00CODE${idx}\x00`;
  });

  // Step 2: Extract inline code to protect it
  const inlineCodes = [];
  html = html.replace(/`([^`\n]+)`/g, (_, code) => {
    const escaped = escapeHtml(code);
    const idx = inlineCodes.length;
    inlineCodes.push(`<code>${escaped}</code>`);
    return `\x00INLINE${idx}\x00`;
  });

  // Step 3: Escape remaining HTML
  html = escapeHtml(html);

  // Step 4: Apply block-level markdown (process line by line)
  const lines = html.split("\n");
  const out = [];
  let inUL = false, inOL = false;

  function closeList() {
    if (inUL) { out.push("</ul>"); inUL = false; }
    if (inOL) { out.push("</ol>"); inOL = false; }
  }

  for (let i = 0; i < lines.length; i++) {
    let line = lines[i];

    // Headings
    const hMatch = line.match(/^(#{1,6})\s+(.+)$/);
    if (hMatch) {
      closeList();
      const lvl = hMatch[1].length;
      out.push(`<h${lvl}>${hMatch[2]}</h${lvl}>`);
      continue;
    }

    // Horizontal rule
    if (/^(---+|\*\*\*+|___+)$/.test(line.trim())) {
      closeList();
      out.push("<hr>");
      continue;
    }

    // Blockquote
    if (line.startsWith("&gt;")) {
      closeList();
      out.push(`<blockquote>${line.slice(4).trim()}</blockquote>`);
      continue;
    }

    // Unordered list item
    const ulMatch = line.match(/^(\*|-|\+)\s+(.+)$/);
    if (ulMatch) {
      if (!inUL) { closeList(); out.push("<ul>"); inUL = true; }
      out.push(`<li>${ulMatch[2]}</li>`);
      continue;
    }

    // Ordered list item
    const olMatch = line.match(/^\d+\.\s+(.+)$/);
    if (olMatch) {
      if (!inOL) { closeList(); out.push("<ol>"); inOL = true; }
      out.push(`<li>${olMatch[1]}</li>`);
      continue;
    }

    // Blank line
    if (line.trim() === "") {
      closeList();
      // Only add paragraph break if there's content above
      if (out.length > 0 && out[out.length - 1] !== "</p>" && out[out.length - 1] !== "<br>") {
        out.push("<br>");
      }
      continue;
    }

    closeList();
    out.push(`<p>${line}</p>`);
  }
  closeList();

  html = out.join("\n");

  // Step 5: Inline markdown (bold+italic, bold, italic, strikethrough)
  html = html.replace(/\*\*\*(.+?)\*\*\*/g, "<strong><em>$1</em></strong>");
  html = html.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
  html = html.replace(/\*(.+?)\*/g, "<em>$1</em>");
  html = html.replace(/~~(.+?)~~/g, "<del>$1</del>");

  // Step 6: Restore placeholders
  html = html.replace(/\x00CODE(\d+)\x00/g, (_, i) => codeBlocks[+i]);
  html = html.replace(/\x00INLINE(\d+)\x00/g, (_, i) => inlineCodes[+i]);
  html = html.replace(/\x00MATH(\d+)\x00/g, (_, i) => mathBlocks[+i]);

  return html;
}

function addMessage(role, content) {
  emptyEl.style.display = "none";
  const row = document.createElement("div");
  row.className = "row";
  const msg = document.createElement("div");
  msg.className = "msg " + role;
  const avatar = document.createElement("div");
  avatar.className = "avatar";
  avatar.textContent = role === "user" ? "U" : "AI";
  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.innerHTML = render(content);
  msg.appendChild(avatar);
  msg.appendChild(bubble);
  row.appendChild(msg);
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return bubble;
}

async function send() {
  const text = inputEl.value.trim();
  if (!text || streaming) return;
  streaming = true;
  sendBtn.disabled = true;

  addMessage("user", text);
  history.push({ role: "user", content: text });
  inputEl.value = "";
  autosize();

  const bubble = addMessage("assistant", "");
  bubble.classList.add("cursor");
  let acc = "";

  try {
    const resp = await fetch("https://chat-api.cognistorm.ai/api/v1/query", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ 
        messages: history,
        stream: true
      }),
    });
    
    if (!resp.ok || !resp.body) throw new Error("HTTP " + resp.status);

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split("\n");
      buf = lines.pop();
      for (const line of lines) {
        const t = line.trim();
        if (!t.startsWith("data:")) continue;
        const data = t.slice(5).trim();
        if (data === "[DONE]") continue;
        try {
          const json = JSON.parse(data);
          const delta = json.choices?.[0]?.delta?.content || "";
          if (delta) {
            acc += delta;
            bubble.innerHTML = render(acc);
            messagesEl.scrollTop = messagesEl.scrollHeight;
          }
        } catch (_) {}
      }
    }
  } catch (err) {
    acc += "\n\n[error: " + err.message + "]";
    bubble.innerHTML = render(acc);
  } finally {
    bubble.classList.remove("cursor");
    history.push({ role: "assistant", content: acc });
    streaming = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }
}
</script>
</body>
</html>
